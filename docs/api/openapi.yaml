    delete:
      tags:
      - KPI Rules
      summary: Delete a KPI milestone
      description: Removes a milestone threshold from a KPI definition.
      operationId: deleteKpiMilestone
      security: *id001
      parameters:
      - name: kpiId
        in: path
        required: true
        description: KPI definition ID
        schema:
          type: integer
      - name: milestoneId
        in: path
        required: true
        description: Milestone ID
        schema:
          type: integer
