components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/system-token
  schemas:
    Error:
      type: object
      required:
      - error
      properties:
        error:
          type: string
          description: Error message
      example:
        error: Resource not found
    Program:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: FY2025 Agency Channel Incentive
        description:
          type: string
          example: Annual incentive program for agency channel agents
        channel_id:
          type: integer
          example: 1
        plan_type:
          type: string
          example: AGENT_INCENTIVE
        start_date:
          type: string
          format: date
          example: '2025-04-01'
        end_date:
          type: string
          format: date
          example: '2026-03-31'
        calc_day_rule:
          type: string
          default: LAST_DAY_OF_MONTH
          example: LAST_DAY_OF_MONTH
        status:
          type: string
          default: DRAFT
          example: ACTIVE
        banner_url:
          type: string
          example: https://cdn.example.com/banners/fy2025.png
        created_by:
          type: integer
          example: 10
        created_at:
          type: string
          format: date-time
          example: '2025-01-15T09:30:00Z'
    ProgramInput:
      type: object
      required:
      - name
      - start_date
      - end_date
      properties:
        name:
          type: string
          example: FY2025 Agency Channel Incentive
        description:
          type: string
          example: Annual incentive program for agency channel agents
        channel_id:
          type: integer
          example: 1
        plan_type:
          type: string
          example: AGENT_INCENTIVE
        start_date:
          type: string
          format: date
          example: '2025-04-01'
        end_date:
          type: string
          format: date
          example: '2026-03-31'
        calc_day_rule:
          type: string
          default: LAST_DAY_OF_MONTH
        status:
          type: string
          default: DRAFT
        banner_url:
          type: string
        created_by:
          type: integer
    KpiDefinition:
      type: object
      properties:
        id:
          type: integer
          example: 1
        program_id:
          type: integer
          example: 1
        kpi_name:
          type: string
          example: New Business APE Achievement
        frequency:
          type: string
          default: MONTHLY
          example: MONTHLY
