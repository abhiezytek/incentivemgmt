openapi: 3.0.3
info:
  title: Insurance Incentive Management System API
  description: Comprehensive API for managing insurance agent incentive programs, KPI tracking, payout calculations, and integration
    with policy administration systems.
  version: 1.0.0
  contact:
    name: Incentive Management Team
    email: incentives@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
- url: /api
  description: API base path
security:
- BearerAuth: []
tags:
- name: Authentication
  description: Authentication and token management
- name: Programs
  description: Incentive program management
- name: KPI Rules
  description: KPI definitions, milestones, and threshold configuration
- name: Payout Rules
  description: Payout calculation rules and slab configurations
- name: Data Upload
  description: CSV file uploads for bulk data ingestion
- name: Calculations
  description: Incentive calculation engine
- name: Incentive Results
  description: Incentive result management and approval workflows
- name: Leaderboard
  description: Agent performance leaderboards
- name: Dashboard
  description: Executive dashboard summaries
- name: Integration - Inbound
  description: Inbound integrations from policy administration systems (Penta, LifeAsia)
- name: Integration - Outbound
  description: Outbound data exports to financial systems
- name: Integration - Status
  description: Integration monitoring, file logs, audit trails, and manual triggers
- name: Agents
  description: Insurance agent management
- name: Products
  description: Insurance product catalog
- name: Incentive Rates
  description: Product incentive rate configuration
- name: Policy Transactions
  description: Policy transaction records
- name: Persistency Data
  description: Policy persistency tracking data
- name: Performance
  description: Agent performance input data
- name: Derived Variables
  description: Formula-driven derived calculation variables
- name: Groups
  description: User groups and team member management
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health check
      description: Returns the health status of the API server. No authentication required.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
              example:
                status: ok
  /auth/system-token:
    post:
      tags:
      - Authentication
      summary: Generate system authentication token
      description: Authenticates a system client using client credentials and returns a JWT token for subsequent API calls.
      operationId: createSystemToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - client_id
              - client_secret
              properties:
                client_id:
                  type: string
                  example: incentive-portal
                client_secret:
                  type: string
                  example: s3cr3t-k3y-v4lue
      responses:
        '201':
          description: Token created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  expires_at:
                    type: string
                    format: date-time
                    example: '2025-04-02T09:30:00Z'
        '400':
          description: 'Missing required fields: client_id and client_secret'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'Missing required fields: client_id and client_secret'
        '401':
          description: Invalid client credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid client credentials
        '500':
          description: JWT configuration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: JWT configuration error
  /programs:
    get:
      tags:
      - Programs
      summary: List all incentive programs
      description: Retrieves a list of all incentive programs configured in the system.
      operationId: listPrograms
      security: &id001
      - BearerAuth: []
      responses:
        '200':
          description: List of programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Program'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Internal server error
    post:
      tags:
      - Programs
      summary: Create a new incentive program
      description: Creates a new incentive program with the provided configuration. The program starts in DRAFT status by
        default.
      operationId: createProgram
      security: *id001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramInput'
      responses:
        '201':
          description: Program created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Bad request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Internal server error
  /programs/{id}:
    get:
      tags:
      - Programs
      summary: Get a specific incentive program
      description: Retrieves detailed information about a single incentive program by its ID.
      operationId: getProgram
      security: *id001
      parameters:
      - name: id
        in: path
        required: true
        description: Program ID
        schema:
          type: integer
      responses:
        '200':
          description: Program details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Unauthorized
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Resource not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Internal server error
    put:
      tags:
      - Programs
      summary: Update an incentive program
      description: Updates an existing incentive program with new values. Only provided fields are updated.
      operationId: updateProgram
      security: *id001
      parameters:
      - name: id
        in: path
        required: true
        description: Program ID
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramInput'
      responses:
        '200':
          description: Program updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Bad request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Unauthorized
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Resource not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Internal server error
    delete:
      tags:
      - Programs
      summary: Delete an incentive program
      description: Deletes an incentive program. This will also remove all associated KPIs, payout rules, and results.
      operationId: deleteProgram
      security: *id001
      parameters:
      - name: id
        in: path
        required: true
        description: Program ID
        schema:
          type: integer
      responses:
        '200':
          description: Deleted program
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Unauthorized
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Resource not found
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Internal server error
